<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザープロフィール - Singu-Link</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">📌 Singu-Link</a>
    <div style="flex:1"></div>
    <nav class="nav-btns">
      <a class="icon-btn" href="messages.html" title="メッセージ">💬</a>
      <a class="icon-btn" href="profile.html" id="profileBtn" title="プロフィール">👤</a>
    </nav>
  </div>
</header>

<main>
  <div class="detail-wrap" id="pageWrap"><div class="empty-state">⏳ 読み込み中...</div></div>
</main>

<script type="module">
  import { db, getCurrentUser, getUserById, esc, timeAgo } from './app.js';
  import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
  const params = new URLSearchParams(location.search);
  const targetId = params.get('id');
  let currentUser = null;

  async function init() {
    currentUser = await getCurrentUser();
    if (currentUser) document.getElementById('profileBtn').textContent = currentUser.icon;
    renderPage();
  }

  async function renderPage() {
    const wrap = document.getElementById('pageWrap');
    if (!targetId) { wrap.innerHTML = `<div class="empty-state">ユーザーが見つかりません</div>`; return; }
    const target = await getUserById(targetId);
    if (!target) { wrap.innerHTML = `<div class="empty-state">ユーザーが見つかりません</div>`; return; }
    const q = query(collection(db, "posts"), where("authorId", "==", targetId));
    const snapshot = await getDocs(q);
    const posts = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.toMillis()||0) - (a.createdAt?.toMillis()||0));
    const isMe = currentUser && currentUser.id === targetId;

    wrap.innerHTML = `
      <button class="back-btn" onclick="history.back()">← 戻る</button>
      <div class="detail-card user-profile-card">
        <div class="user-profile-header">
          <div class="user-profile-avatar">${esc(target.icon)}</div>
          <div class="user-profile-info"><div class="user-profile-name">${esc(target.username)}</div><div class="user-profile-join">メンバー</div></div>
        </div>
        <p class="user-bio ${!target.bio?'empty-bio':''}">${esc(target.bio || '自己紹介はありません')}</p>
        <div class="user-profile-actions">${isMe ? `<a href="profile.html" class="msg-btn" style="text-decoration:none; text-align:center;">✏️ 編集</a>` : `<button class="msg-btn" id="msgBtn">💬 メッセージを送る</button>`}</div>
      </div>
      <div class="detail-card">
        <div class="section-label">📝 投稿一覧（${posts.length}件）</div>
        <div id="userPosts">${posts.map(p => `<a class="post-card" href="post.html?id=${p.id}" style="display:block; margin-bottom:10px;"><div class="post-content" style="margin-bottom:10px;">${esc(p.content)}</div>${p.image ? `<img src="${p.image}" class="post-image">` : ''}<div class="post-footer"><span class="post-stat">♥ ${p.likeCount || 0}</span><span class="post-stat">💬 ${p.commentCount || 0}</span><span class="post-stat" style="margin-left:auto;">${timeAgo(p.createdAt)}</span></div></a>`).join('')}</div>
      </div>
    `;
    if (!isMe && document.getElementById('msgBtn')) document.getElementById('msgBtn').onclick = () => location.href = `messages.html?with=${targetId}`;
  }
  init();
</script>
</body>
</html>
