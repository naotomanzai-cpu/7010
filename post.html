<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投稿詳細 - Singu-Link</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">📌 Singu-Link</a>
    <div style="flex:1"></div>
    <nav class="nav-btns">
      <a class="icon-btn" href="messages.html" title="メッセージ">💬</a>
      <a class="icon-btn" href="profile.html" id="profileBtn" title="プロフィール">👤</a>
    </nav>
  </div>
</header>

<main>
  <div class="detail-wrap" id="pageWrap">
    <div class="empty-state"><p>⏳ 読み込み中...</p></div>
  </div>
</main>

<script src="app.js"></script>
<script>
  const params      = new URLSearchParams(location.search);
  const postId      = params.get('id');
  const currentUser = getCurrentUser();

  if (currentUser) document.getElementById('profileBtn').textContent = currentUser.icon;

  function renderPage() {
    const wrap = document.getElementById('pageWrap');
    const post = getPostById(postId);

    if (!post) {
      wrap.innerHTML = `<div class="empty-state"><p>投稿が見つかりません</p></div>`;
      return;
    }

    const author    = getUserById(post.authorId);
    const comments  = getComments(postId);
    const liked     = hasLiked(postId);
    const likeCount = getLikeCount(postId);
    const isOwn     = currentUser && currentUser.id === post.authorId;
    const tagsHtml  = (post.tags || []).map(t => tagChipStop(t)).join('');

    const commentsHtml = comments.length > 0
      ? comments.map(c => {
          const u = getUserById(c.authorId);
          return `
            <div class="comment-item">
              <div class="avatar sm">${esc(u?.icon || '👤')}</div>
              <div class="comment-body">
                <span class="comment-author">${esc(u?.username || '匿名')}</span>
                <span class="comment-time">${timeAgo(c.createdAt)}</span>
                <div class="comment-text">${esc(c.content)}</div>
              </div>
            </div>`;
        }).join('')
      : `<p style="color:var(--text-muted);font-size:14px;padding:8px 0">まだコメントはありません</p>`;

    const commentFormHtml = currentUser
      ? `<div class="comment-form">
           <div class="avatar sm">${esc(currentUser.icon)}</div>
           <div class="comment-input-wrap">
             <textarea class="comment-textarea" id="commentTa" placeholder="コメントを書く..." rows="2"></textarea>
             <button class="comment-submit" id="commentSubmitBtn">💬 コメントを投稿する</button>
           </div>
         </div>`
      : `<p class="login-hint"><a href="profile.html?setup=1&next=${encodeURIComponent(location.href)}">ログイン</a>するとコメントできます</p>`;

    wrap.innerHTML = `
      <button class="back-btn" onclick="history.back()">← 戻る</button>

      <div class="detail-card">
        <div class="post-header">
          <div class="avatar lg">${esc(author?.icon || '👤')}</div>
          <div class="post-meta">
            <div class="post-author">${esc(author?.username || '匿名')}</div>
            <div class="post-time">${timeAgo(post.createdAt)}</div>
          </div>
          <div style="display:flex;gap:8px;margin-left:auto">
            ${!isOwn && currentUser
              ? `<button class="msg-btn" onclick="location.href='messages.html?with=${esc(post.authorId)}'">💬 DM</button>`
              : ''}
            ${isOwn
              ? `<button class="delete-btn" onclick="deleteThisPost()">🗑 削除</button>`
              : ''}
          </div>
        </div>

        <div class="detail-full-content">${esc(post.content)}</div>

        ${post.image ? `<img src="${esc(post.image)}" class="post-image-detail">` : ''}

        ${tagsHtml ? `<div class="post-tags">${tagsHtml}</div>` : ''}

        <div style="display:flex;gap:10px;align-items:center;margin-top:14px">
          <button class="like-btn-detail ${liked ? 'liked' : ''}" id="likeBtn">
            <span class="like-heart">♥</span>
            <span id="likeCount">${likeCount}</span> いいね
          </button>
        </div>
      </div>

      <div class="detail-card">
        <div class="section-label">💬 コメント（${comments.length}件）</div>
        <div id="commentsList">${commentsHtml}</div>
        ${commentFormHtml}
      </div>
    `;

    // Like button
    document.getElementById('likeBtn').addEventListener('click', () => {
      if (!currentUser) { location.href = 'profile.html?setup=1'; return; }
      const isLiked = toggleLike(postId);
      document.getElementById('likeBtn').classList.toggle('liked', isLiked);
      document.getElementById('likeCount').textContent = getLikeCount(postId);
    });

    // Comment submit
    if (currentUser) {
      document.getElementById('commentSubmitBtn').addEventListener('click', submitComment);
      document.getElementById('commentTa').addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitComment();
      });
    }
  }

  function submitComment() {
    const ta   = document.getElementById('commentTa');
    const text = ta?.value.trim();
    if (!text) return;
    addComment(postId, text);
    ta.value = '';
    renderPage();
  }

  window.deleteThisPost = function() {
    if (!confirm('この投稿を削除しますか？')) return;
    const posts = getPosts().filter(p => !(p.id === postId && p.authorId === currentUser?.id));
    _setArr(KEYS.posts, posts);
    location.href = 'index.html';
  };

  renderPage();
</script>
</body>
</html>
