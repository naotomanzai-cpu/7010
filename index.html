<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Singu-Link - 校内掲示板</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">📌 Singu-Link</a>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="投稿を検索...">
    </div>
    <nav class="nav-btns">
      <a class="icon-btn" href="messages.html" title="メッセージ">
        💬<span class="badge hidden" id="unreadBadge"></span>
      </a>
      <a class="icon-btn" href="profile.html" id="profileBtn" title="プロフィール">👤</a>
    </nav>
  </div>
</header>

<main>
  <div class="feed" id="feed">
    <div id="composeArea"></div>
    <div class="tag-filter-wrap">
      <button class="tag-scroll-btn tag-scroll-left" onclick="scrollTagBar(-1)">❮</button>
      <div class="tag-filter-scroll" id="tagFilter"></div>
      <button class="tag-scroll-btn tag-scroll-right" onclick="scrollTagBar(1)">❯</button>
    </div>
    <div class="list-meta">
      <span class="list-count" id="listCount"></span>
      <select class="sort-select" id="sortSelect" onchange="applyFilters()">
        <option value="newest">新しい順</option>
        <option value="popular">人気順（♥＋💬）</option>
      </select>
    </div>
    <div id="postList"></div>
  </div>
</main>

<div class="modal-overlay hidden" id="tagModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">タグを選択 (最大3つ)</div>
      <button class="modal-close" id="closeTagModal">✕</button>
    </div>
    <div class="tag-grid" id="tagGrid"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="confirmTags">決定</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="app.js"></script>
<script>
  let activeTag = '';
  let selectedTags = [];
  let selectedImageData = null;
  let allPosts = [];
  let myLikes = {};

  const urlParams = new URLSearchParams(location.search);
  if (urlParams.get('tag')) activeTag = urlParams.get('tag');

  function init() {
    updateHeader();
    renderCompose();
    renderTagFilter();

    // リアルタイムで未読数を更新
    listenUnread(count => {
      const badge = document.getElementById('unreadBadge');
      if (count > 0) { badge.textContent = count > 9 ? '9+' : count; badge.classList.remove('hidden'); }
      else badge.classList.add('hidden');
    });

    // 自分のいいね済み投稿を読み込んでから投稿リストを購読
    loadMyLikes(likes => {
      myLikes = likes;
      listenPosts(posts => {
        allPosts = posts;
        applyFilters();
      });
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  }

  function updateHeader() {
    const user = getCurrentUser();
    document.getElementById('profileBtn').textContent = user ? user.icon : '👤';
  }

  function renderCompose() {
    const user = getCurrentUser();
    const area = document.getElementById('composeArea');
    if (!user) {
      area.innerHTML = `<div class="login-banner"><p>📣 投稿するにはプロフィールを設定してください</p><button class="login-banner-btn" onclick="location.href='profile.html?setup=1&next=index.html'">はじめる</button></div>`;
      return;
    }
    area.innerHTML = `
      <div class="compose-card">
        <div class="compose-inner">
          <div class="compose-avatar" style="cursor:pointer" onclick="location.href='profile.html'">${esc(user.icon)}</div>
          <div class="compose-body">
            <textarea class="compose-textarea" id="composeTa" placeholder="学校の情報をシェアしよう..." rows="3" maxlength="150"></textarea>
            <div class="char-counter" id="charCounter">0 / 150</div>
            <div class="compose-img-preview-wrap" id="imgPreviewWrap">
              <img src="" class="compose-img-preview" id="imgPreview">
              <button class="compose-img-remove" onclick="removeSelectedImage()">✕</button>
            </div>
          </div>
        </div>
        <div class="compose-tags" id="composeTags"></div>
        <div class="compose-divider"></div>
        <div class="compose-footer">
          <div class="compose-action-btns">
            <button class="compose-tag-btn" onclick="openTagPicker()" id="tagPickerBtn"># タグ</button>
            <button class="compose-photo-btn" onclick="document.getElementById('imageInput').click()" id="photoBtn">📷 写真</button>
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(this)">
          </div>
          <button class="compose-submit" id="composeSubmitBtn" onclick="submitPost()" disabled>投稿する</button>
        </div>
      </div>`;
    document.getElementById('composeTa').addEventListener('input', function() {
      document.getElementById('charCounter').textContent = `${this.value.length} / 150`;
      document.getElementById('composeSubmitBtn').disabled = this.value.trim().length === 0;
    });
  }

  function handleImageSelect(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const MAX = 600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else        { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        selectedImageData = canvas.toDataURL('image/jpeg', 0.6);
        if (selectedImageData.length > 600000) {
          alert('画像が大きすぎます。もっと小さい画像を選んでください。');
          selectedImageData = null;
          document.getElementById('imageInput').value = '';
          return;
        }
        document.getElementById('imgPreview').src = selectedImageData;
        document.getElementById('imgPreviewWrap').style.display = 'block';
        document.getElementById('photoBtn').classList.add('has-img');
        // 画像があれば投稿ボタンを有効化
        document.getElementById('composeSubmitBtn').disabled = false;
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function removeSelectedImage() {
    selectedImageData = null;
    document.getElementById('imageInput').value = '';
    document.getElementById('imgPreviewWrap').style.display = 'none';
    document.getElementById('photoBtn').classList.remove('has-img');
  }

  function submitPost() {
    const ta = document.getElementById('composeTa');
    const text = ta.value.trim();
    if (!text && !selectedImageData) return;
    const result = createPost(text || '📷', selectedTags, selectedImageData);
    if (!result) { alert('投稿に失敗しました。Firebaseの設定を確認してください。'); return; }
    selectedTags = [];
    selectedImageData = null;
    renderCompose();
  }

  function renderTagFilter() {
    const bar = document.getElementById('tagFilter');
    bar.innerHTML = `<span class="filter-chip all ${activeTag===''?'active':''}" onclick="filterByTag('')">すべて</span>` +
      PRESET_TAGS.map(t => `<span class="filter-chip ${activeTag===t?'active':''}" onclick="filterByTag('${esc(t)}')">#${esc(t)}</span>`).join('');
  }
  function filterByTag(tag) { activeTag = tag; renderTagFilter(); applyFilters(); }

  function applyFilters() {
    const sortBy = document.getElementById('sortSelect').value;
    const q = document.getElementById('searchInput')?.value.trim().toLowerCase();
    let posts = [...allPosts];
    if (q) posts = posts.filter(p => p.content.toLowerCase().includes(q) || (p.tags||[]).some(t => t.includes(q)));
    if (activeTag) posts = posts.filter(p => (p.tags||[]).includes(activeTag));
    if (sortBy === 'popular') posts.sort((a,b) => ((b.likeCount||0)+(b.commentCount||0)) - ((a.likeCount||0)+(a.commentCount||0)));
    else posts.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    renderPostList(posts);
  }

  function renderPostList(posts) {
    const list = document.getElementById('postList');
    document.getElementById('listCount').textContent = `${posts.length}件`;
    if (posts.length === 0) {
      list.innerHTML = `<div class="empty-state"><p>投稿がありません</p></div>`;
      return;
    }
    list.innerHTML = posts.map(p => {
      const liked = myLikes[p.id] || false;
      const tagsHtml = (p.tags||[]).map(t => tagChipStop(t)).join('');
      return `
        <a class="post-card" href="post.html?id=${p.id}">
          <div class="post-header">
            <div class="avatar">${esc(p.authorIcon||'👤')}</div>
            <div class="post-meta">
              <div class="post-author">${esc(p.authorName||'匿名')}</div>
              <div class="post-time">${timeAgo(p.createdAt)}</div>
            </div>
          </div>
          <div class="post-content clamped">${esc(p.content)}</div>
          ${p.image ? `<img src="${p.image}" class="post-image">` : ''}
          ${tagsHtml ? `<div class="post-tags">${tagsHtml}</div>` : ''}
          <div class="post-footer">
            <button class="like-btn-card ${liked?'liked':''}" onclick="event.preventDefault();handleLikeClick(this,'${p.id}')">
              ♥ <span class="like-num">${p.likeCount||0}</span>
            </button>
            <span class="post-stat">💬 ${p.commentCount||0}</span>
          </div>
        </a>`;
    }).join('');
  }

  function handleLikeClick(btn, postId) {
    const isLiked = btn.classList.contains('liked');
    const numEl = btn.querySelector('.like-num');
    btn.classList.toggle('liked');
    numEl.textContent = Math.max(0, parseInt(numEl.textContent) + (isLiked ? -1 : 1));
    if (isLiked) delete myLikes[postId]; else myLikes[postId] = true;
    toggleLike(postId);
  }

  function openTagPicker() {
    const grid = document.getElementById('tagGrid');
    grid.innerHTML = PRESET_TAGS.map(t => `<div class="tag-option ${selectedTags.includes(t)?'selected':''}" style="${tagStyle(t)}" onclick="toggleSelectTag('${esc(t)}',this)">#${esc(t)}</div>`).join('');
    document.getElementById('tagModal').classList.remove('hidden');
  }
  function toggleSelectTag(tag, el) {
    if (selectedTags.includes(tag)) selectedTags = selectedTags.filter(t => t !== tag);
    else if (selectedTags.length < 3) selectedTags.push(tag);
    el.classList.toggle('selected', selectedTags.includes(tag));
  }

  document.getElementById('closeTagModal').onclick = () => document.getElementById('tagModal').classList.add('hidden');
  document.getElementById('confirmTags').onclick = () => {
    document.getElementById('tagModal').classList.add('hidden');
    document.getElementById('composeTags').innerHTML = selectedTags.map(t => tagChip(t, false)).join('');
  };
  document.getElementById('searchInput').oninput = () => applyFilters();
  window.scrollTagBar = (dir) => document.getElementById('tagFilter').scrollBy({ left: dir * 200, behavior: 'smooth' });

  init();
</script>
</body>
</html>
